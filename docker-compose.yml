name: impulse-fitness

services:
  mysql:
    image: mysql:8.0
    container_name: impulse-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: impulse_fitness
      MYSQL_USER: impulse
      MYSQL_PASSWORD: impulse123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uimpulse", "-pimpulse123"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  impulse:
    build: .
    container_name: impulse-fitness
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      JWT_SECRET: impulse-fitness-jwt-secret-2026
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: impulse
      DB_PASSWORD: impulse123
      DB_NAME: impulse_fitness
    restart: unless-stopped

volumes:
  mysql-data:
